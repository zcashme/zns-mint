[package]
name = "zns-chain"
description = "ZNS chain I/O: lightwalletd compact-block intake scan and zebrad gRPC broadcast."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
zns-core = { workspace = true }
# orchard types in the scanned-note API; trial-decryption drives intake. The
# registry is Orchard-only, so the scanner takes a bare FVK — no zcash_keys/UFVK.
orchard = { workspace = true, features = ["unsafe-zns"] }
zcash_primitives = { workspace = true }
zcash_protocol = { workspace = true }
# lightwalletd gRPC transport: zcash_client_backend supplies the proto client +
# message types; tonic supplies the Channel (plaintext for regtest, TLS for
# public servers). zcash_note_encryption drives Orchard trial-decryption.
zcash_client_backend = { workspace = true }
zcash_note_encryption = { workspace = true }
tonic = { workspace = true, features = ["transport", "tls-ring", "tls-webpki-roots"] }
# decode lightwalletd's hex-encoded commitment tree (GetTreeState → anchor)
hex = { workspace = true }
# Treasury note-state: WalletDb owns scanning, shardtree witnesses, reorg
# rewind, and note selection; `sync::run` drives it. rusqlite names the
# connection type in WalletDb's generics; zcash_keys wraps the registry FVK
# as the UFVK account import wants; async-trait is the BlockCache contract.
zcash_client_sqlite = { workspace = true }
zcash_keys = { workspace = true }
zcash_address = { workspace = true }
rusqlite = { workspace = true }
rand = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
# Regtest smoke tests derive a throwaway FVK and run the async scan pipeline.
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
zip32 = { workspace = true }

[lints]
workspace = true
